<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="257px" preserveAspectRatio="none" style="width:870px;height:257px;" version="1.1" viewBox="0 0 870 257" width="870px" zoomAndPan="magnify"><title>Test Team Organization</title><defs/><g><g class="title" data-source-line="1"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="158.6963" x="348.8237" y="24.5332">Test Team Organization</text></g><!--entity PM--><g class="entity" data-entity="PM" data-source-line="7" data-uid="ent0002" id="entity_PM"><rect fill="#F1F1F1" height="55.2188" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="318.0469" x="324.5" y="45.6094"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="136.9307" x="334.5" y="70.1426">Project Manager (PM)</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="298.0469" x="334.5" y="87.752">Schedule control and supervisor communication</text></g><!--entity Designer--><g class="entity" data-entity="Designer" data-source-line="8" data-uid="ent0003" id="entity_Designer"><rect fill="#F1F1F1" height="90.4375" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="310.9922" x="7" y="160.6094"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="134.627" x="17" y="185.1426">Test Design Engineer</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="266.123" x="17" y="202.752">- Generate test cases with AutoTestDesign</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="290.9922" x="17" y="220.3613">- Review risks and coverage items interactively</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="132.2754" x="17" y="237.9707">- Maintain traceability</text></g><!--entity Executor--><g class="entity" data-entity="Executor" data-source-line="9" data-uid="ent0004" id="entity_Executor"><rect fill="#F1F1F1" height="90.4375" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="260.7754" x="353" y="160.6094"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="152.5303" x="363" y="185.1426">Test Execution Engineer</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="240.7754" x="363" y="202.752">- Implement JUnit 5 + MockMvc scripts</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="229.5439" x="363" y="220.3613">- Run security and performance tests</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="175.082" x="363" y="237.9707">- Record defects and results</text></g><!--entity DevSupport--><g class="entity" data-entity="DevSupport" data-source-line="10" data-uid="ent0005" id="entity_DevSupport"><rect fill="#F1F1F1" height="90.4375" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="215.3438" x="649" y="160.6094"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="195.3438" x="659" y="185.1426">Development Support Engineer</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="186.7578" x="659" y="202.752">- Provide the test environment</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="153.3027" x="659" y="220.3613">- Help reproduce defects</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="90.2344" x="659" y="237.9707">- Confirm fixes</text></g><!--link PM to Designer--><g class="link" data-entity-1="PM" data-entity-2="Designer" data-source-line="12" data-uid="lnk6" id="link_PM_Designer"><path d="M418.15,100.6794 C375.9,117.8494 325.4383,138.3699 276.6083,158.2199" fill="none" id="PM-to-Designer" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="271.05,160.4794,280.8938,160.7956,275.6819,158.5964,277.8811,153.3846,271.05,160.4794" style="stroke:#181818;stroke-width:1;"/></g><!--link PM to Executor--><g class="link" data-entity-1="PM" data-entity-2="Executor" data-source-line="13" data-uid="lnk7" id="link_PM_Executor"><path d="M483.5,100.8294 C483.5,117.9794 483.5,134.6694 483.5,154.4494" fill="none" id="PM-to-Executor" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="483.5,160.4494,487.5,151.4494,483.5,155.4494,479.5,151.4494,483.5,160.4494" style="stroke:#181818;stroke-width:1;"/></g><!--link PM to DevSupport--><g class="link" data-entity-1="PM" data-entity-2="DevSupport" data-source-line="14" data-uid="lnk8" id="link_PM_DevSupport"><path d="M539.07,100.6794 C575.01,117.8494 617.2466,138.0419 658.7766,157.8919" fill="none" id="PM-to-DevSupport" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="664.19,160.4794,657.7948,152.9893,659.6788,158.3232,654.3449,160.2072,664.19,160.4794" style="stroke:#181818;stroke-width:1;"/></g><!--SRC=[PP51Rzim38Nl_XL4Jns677SjCBJ5rW76WdMxzQB8jCF59WMASjhz-b6saJNOmOObyl5zV3Qo4U4dPlDNcE2x3e7fJp0IRffy8av1_VuGucbGATpTooWAfe6pbv3jNLS-XaxEn0FqOSpOc2GmWOEOoGGTASPrSFq8FBZrpLxbjv-W3Hm6LBZTjnzU-3aUiIjUZyAcCaBW3d99g3DbzuyoJOKfBg0t43Bis_TJbuqUCDF0yCW3CQA-y0w-8AC6Gx3Q44F636Uo8tmk9bMqQchh3vm9pw2KJtcnZpAxTa0Wmoa3iVdH5vfnVAk2DlYLFpMSYE508zdRmhOEHVsFyF4LOwahN44-JMd4oQE5Rx-O33x1HsWbdjevGevAoV82M1YowzLj5a1FfnUT0iTrlxKBesW77VRklIwYcCjeUK5R2UGAxG5z9KaBmND9ITIk-FoNpTIvnt7B4Nac5Qw2Ml-AOtAJfD8LHzciQ-LUk2UTeATNp5iqysRHDFiMThkxVsbjvmlYfNwH_0K0]--></g></svg>